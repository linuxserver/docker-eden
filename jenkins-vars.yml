---

# jenkins variables
project_name: docker-eden
external_type: na
custom_version_command: |
  curl -sX GET 'https://git.eden-emu.dev/api/v1/repos/eden-emu/eden/releases/latest' | awk '/tag_name/{print $6;exit}' FS='[""]'
release_type: stable
release_tag: latest
ls_branch: master
repo_vars:
  - EXT_USER = 'eden-emulator'
  - EXT_REPO = 'Releases'
  - BUILD_VERSION_ARG = 'EDEN_VERSION'
  - LS_USER = 'linuxserver'
  - LS_REPO = 'docker-eden'
  - CONTAINER_NAME = 'eden'
  - DOCKERHUB_IMAGE = 'linuxserver/eden'
  - DEV_DOCKERHUB_IMAGE = 'lsiodev/eden'
  - PR_DOCKERHUB_IMAGE = 'lspipepr/eden'
  - DIST_IMAGE = 'debian'
  - MULTIARCH = 'false'
  - CI = 'true'
  - CI_WEB = 'true'
  - CI_PORT = '3001'
  - CI_SSL = 'true'
  - CI_DELAY = '120'
  - CI_DOCKERENV = 'TZ=US/Pacific'
  - CI_AUTH = 'user:password'
  - CI_WEBPATH = ''
